<!DOCTYPE html>
<html lang="en">
  <head>
    <script src="https://cdn.jsdelivr.net/npm/p5@1.11.13/lib/p5.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/p5@1.11.13/lib/addons/p5.sound.min.js"></script>
    <link rel="stylesheet" type="text/css" href="style.css">
    <meta charset="utf-8" />

    <style>
      /* This makes the page fill the whole screen and centers the content */
      body {
        margin: 0;
        padding: 0;
        background-color: black; /* Sets the whole page background to black */
        display: flex;
        justify-content: center; /* Horizontal centering */
        align-items: center;     /* Vertical centering */
        height: 100vh;           /* Takes up 100% of the viewport height */
        overflow: hidden;        /* Prevents scrollbars if the canvas is large */
      }

      /* Ensures the canvas doesn't have weird spacing */
      canvas {
        height: 100vh;
        display: block;
      }
    </style>
  </head>
  <body>
    <!-- p5.js automatically puts the canvas inside the body or main -->
    <script src="sketch.js"></script>
  </body>
</html>
