<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title id="pageTitle">Chinese Writing Practice</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <script src="https://cdn.jsdelivr.net/npm/hanzi-writer@3.5/dist/hanzi-writer.min.js"></script>
    <style>
        .hint-fade-in {
            animation: fadeIn 0.2s ease-in-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }
        .no-select {
            -webkit-user-select: none;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        .container {
            overflow-x: hidden;
        }
        .row-wrapper {
            text-align: center;
            margin: 1rem 0;
        }

        /* Main container: flex column, holds scrollable content + custom scrollbar */
        #charactersRow {
            display: flex;
            flex-direction: column;
            background-color: rgb(249 250 251 / 0.3);
            border-radius: 0.75rem;
            padding: 0.5rem;
            gap: 0.5rem;
            max-width: 100%;
            margin: 0 auto; /* center the block */
        }
        .dark #charactersRow {
            background-color: rgb(31 41 55 / 0.3);
        }

        /* Scrollable content area (horizontal scroll, no native scrollbar visible) */
        .scroll-content {
            display: inline-flex;
            flex-wrap: nowrap;
            overflow-x: auto;
            gap: 0.5rem;
            -webkit-overflow-scrolling: touch;
            scroll-snap-type: x mandatory;
            scrollbar-width: none; /* Firefox */
        }
        .scroll-content::-webkit-scrollbar {
            display: none; /* Chrome/Safari */
        }

        /* Custom scrollbar container (inside #charactersRow) */
        .custom-scrollbar {
            display: none;
            width: 100%;
            padding: 4px 0;
            box-sizing: border-box;
        }
        .custom-scrollbar-track {
            background-color: #e2e8f0;
            border-radius: 12px;
            height: 6px;
            width: 100%;
            position: relative;
            cursor: pointer;
        }
        .dark .custom-scrollbar-track {
            background-color: #334155;
        }
        .custom-scrollbar-thumb {
            position: absolute;
            left: 0;
            top: 0;
            height: 100%;
            width: 20%;
            background-color: #3b82f6;
            border-radius: 12px;
            cursor: grab;
            transition: background-color 0.1s;
        }
        .custom-scrollbar-thumb:active {
            cursor: grabbing;
            background-color: #2563eb;
        }
        .custom-scrollbar-thumb:hover {
            background-color: #2563eb;
        }

        .char-canvas-container {
            flex-shrink: 0;
            width: 80vw;
            max-width: 400px;
            scroll-snap-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            touch-action: pan-y !important;
            transition: opacity 0.2s;
        }
        .char-canvas-container svg {
            width: 100% !important;
            height: auto !important;
            max-height: 70vh;
        }
        @media (min-width: 768px) {
            .char-canvas-container {
                width: 45vw;
                max-width: 380px;
            }
        }
        .quiz-completed .char-canvas-container {
            pointer-events: none;
        }
        .phase-pulse {
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }
        .game-grid {
            display: grid;
            grid-template-columns: 1fr min(100%, 672px) 1fr;
        }
        .game-grid > * {
            grid-column: 2 / 3;
        }
    </style>
</head>

<body class="bg-gray-100 dark:bg-gray-900 min-h-screen transition-colors" style="touch-action: pan-y;">
    <script>
        if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
            document.documentElement.classList.add('dark');
        }
        window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', event => {
            if (event.matches) document.documentElement.classList.add('dark');
            else document.documentElement.classList.remove('dark');
        });
    </script>

    <div class="container mx-auto px-3 py-4 max-w-full">
        <div class="game-grid">
            <h1 id="title" class="text-2xl sm:text-3xl font-bold text-center mb-4 text-gray-800 dark:text-white">
                Chinese Writing Practice
            </h1>
            <div id="gameScreen" class="space-y-4 sm:space-y-6">
                <div class="w-full bg-gray-200 dark:bg-gray-700 rounded-full h-3 overflow-hidden">
                    <div id="progressBar" class="bg-blue-500 h-3 rounded-full transition-all duration-300" style="width: 0%"></div>
                </div>
                <div class="flex flex-wrap justify-between items-center gap-2 text-sm">
                    <div class="flex items-center space-x-2">
                        <span id="phaseIndicator" class="inline-block px-3 py-1 rounded-full text-xs font-semibold bg-blue-100 dark:bg-blue-900 text-blue-700 dark:text-blue-300 phase-pulse">Phase 1</span>
                        <span id="wordCounter" class="text-gray-600 dark:text-gray-400 font-medium">Word 1 / 20</span>
                    </div>
                    <div class="flex items-center space-x-3">
                        <span id="attemptsDisplay" class="text-gray-600 dark:text-gray-400 font-medium">Attempt 1/2</span>
                        <span id="missCounter" class="text-orange-500 dark:text-orange-400 font-medium hidden">
                            <i class="fa fa-exclamation-triangle"></i> <span id="missCount">0</span> misses
                        </span>
                    </div>
                    <button id="restartSessionBtn" class="bg-gray-200 dark:bg-gray-700 hover:bg-gray-300 dark:hover:bg-gray-600 text-gray-700 dark:text-gray-300 px-3 py-2 rounded-lg font-medium transition-colors text-sm">
                        <i class="fa fa-refresh"></i> Restart
                    </button>
                </div>
                <div class="bg-white dark:bg-gray-800 rounded-xl shadow-lg border border-gray-200 dark:border-gray-700 p-4 sm:p-6 text-center">
                    <div id="frenchDefinition" class="text-2xl sm:text-3xl font-bold text-gray-800 dark:text-white mb-2">Loading...</div>
                    <div id="pinyinDisplay" class="text-lg sm:text-xl text-gray-600 dark:text-gray-400">Loading...</div>
                </div>
            </div>
        </div>

        <!-- Hanzi row: now contains scrollable content + custom scrollbar inside it -->
        <div class="row-wrapper">
            <div id="charactersRow">
                <div class="scroll-content" id="scrollContent"></div>
                <div class="custom-scrollbar" id="customScrollbar">
                    <div class="custom-scrollbar-track" id="scrollbarTrack">
                        <div class="custom-scrollbar-thumb" id="scrollbarThumb"></div>
                    </div>
                </div>
            </div>
        </div>

        <div class="game-grid">
            <div class="space-y-4">
                <div id="messageArea" class="text-center text-sm text-gray-500 dark:text-gray-400 min-h-[24px]"></div>
                <div class="flex justify-center space-x-4 px-2">
                    <button id="resetCanvasBtn" class="flex-1 max-w-44 flex items-center justify-center space-x-2 bg-gray-400 hover:bg-gray-500 active:bg-gray-600 text-white px-4 py-4 rounded-lg font-semibold transition-colors min-h-[56px] text-base disabled:opacity-50 disabled:cursor-not-allowed">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path>
                        </svg>
                        <span>Reset All</span>
                    </button>
                </div>
            </div>
        </div>

        <div id="resultsScreen" class="hidden text-center space-y-4 sm:space-y-6 px-2 max-w-2xl mx-auto mt-6">
            <h2 class="text-xl sm:text-2xl font-bold text-gray-800 dark:text-white mb-4 sm:mb-6">🎉 Congratulations! 🎉</h2>
            <div class="bg-white dark:bg-gray-800 rounded-xl p-4 sm:p-6 shadow-lg border border-gray-200 dark:border-gray-700">
                <p class="text-gray-600 dark:text-gray-400 mb-4">You have completed both phases of writing practice!</p>
                <div class="grid grid-cols-2 gap-4 mb-4 sm:mb-6">
                    <div class="text-center">
                        <div id="resultCharsMastered" class="text-2xl sm:text-3xl font-bold text-green-500">0</div>
                        <div class="text-sm text-gray-600 dark:text-gray-400">Characters Mastered</div>
                    </div>
                    <div class="text-center">
                        <div id="resultTotalMistakes" class="text-2xl sm:text-3xl font-bold text-orange-500">0</div>
                        <div class="text-sm text-gray-600 dark:text-gray-400">Total Mistakes</div>
                    </div>
                </div>
                <div class="text-center">
                    <div id="resultHintsShown" class="text-2xl sm:text-3xl font-bold text-blue-500">0</div>
                    <div class="text-sm text-gray-600 dark:text-gray-400">Hints Shown</div>
                </div>
            </div>
            <div class="space-y-3">
                <button id="restartFromResultsBtn" class="w-full bg-blue-500 hover:bg-blue-600 active:bg-blue-700 text-white px-6 py-4 rounded-lg font-semibold transition-colors min-h-[56px] text-base">
                    <i class="fa fa-refresh mr-2"></i> Restart Session
                </button>
                <a href="/home" class="block w-full bg-gray-300 dark:bg-gray-700 hover:bg-gray-400 dark:hover:bg-gray-600 text-gray-700 dark:text-gray-300 px-6 py-4 rounded-lg font-semibold transition-colors min-h-[56px] text-base text-center no-underline">
                    <i class="fa fa-home mr-2"></i> Choose Another Deck
                </a>
            </div>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const deckName = urlParams.get('deck');

        async function load_flashcards() {
            if (deckName) {
                const jsFileURL = `./decks/${deckName}.js`;
                try {
                    const module = await import(jsFileURL);
                    const flashcards = module.flashcards;
                    if (!flashcards) {
                        window.location.href = "/home";
                        return;
                    }
                    let defaultName = 'Chinese Writing Practice';
                    let titleText = (module.title ? module.title + ' - ' : '') + defaultName;
                    if (!module.title) titleText = defaultName;
                    document.getElementById('title').textContent = titleText;
                    document.getElementById('pageTitle').textContent = titleText;
                    initializeApp(flashcards);
                } catch (err) {
                    window.location.href = "/home";
                }
            } else {
                window.location.href = "/home";
            }
        }
        load_flashcards();

        function initializeApp(loadedFlashcards) {
            class WritingPracticeApp {
                constructor(flashcards) {
                    this.originalDeck = Array.isArray(flashcards) ? flashcards : [];
                    this.totalWords = this.originalDeck.length;
                    this.wordCharacters = this.originalDeck.map(card => [...card.chinese]);

                    this.currentPhase = 1;
                    this.currentWordIndex = 0;

                    this.PHASE1_MAX_ATTEMPTS = 2;
                    this.PHASE2_MAX_ATTEMPTS = 2;

                    this.phase1Progress = [];
                    this.phase2Progress = [];
                    this.animationShown = new Array(this.totalWords).fill(false);

                    this.writers = [];
                    this.activeQuizzes = 0;
                    this.isAnimating = false;
                    this.isTransitioning = false;

                    this.totalMistakesAllTime = 0;
                    this.totalHintsShown = 0;

                    // References for scrollable content and custom scrollbar
                    this.scrollContent = null;
                    this.customScrollbar = null;
                    this.scrollbarTrack = null;
                    this.scrollbarThumb = null;
                    this.resizeObserver = null;
                    this.isDraggingThumb = false;

                    this.cacheDom();
                    this.bindEvents();
                    this.initCustomScrollbar();
                    this.startSession();
                }

                cacheDom() {
                    this.gameScreen = document.getElementById('gameScreen');
                    this.resultsScreen = document.getElementById('resultsScreen');
                    this.progressBar = document.getElementById('progressBar');
                    this.phaseIndicator = document.getElementById('phaseIndicator');
                    this.wordCounter = document.getElementById('wordCounter');
                    this.attemptsDisplay = document.getElementById('attemptsDisplay');
                    this.missCounter = document.getElementById('missCounter');
                    this.missCountSpan = document.getElementById('missCount');
                    this.frenchDefinition = document.getElementById('frenchDefinition');
                    this.pinyinDisplay = document.getElementById('pinyinDisplay');
                    this.charactersRow = document.getElementById('charactersRow');
                    this.scrollContent = document.getElementById('scrollContent');
                    this.customScrollbar = document.getElementById('customScrollbar');
                    this.scrollbarTrack = document.getElementById('scrollbarTrack');
                    this.scrollbarThumb = document.getElementById('scrollbarThumb');
                    this.messageArea = document.getElementById('messageArea');
                    this.resetCanvasBtn = document.getElementById('resetCanvasBtn');
                    this.restartSessionBtn = document.getElementById('restartSessionBtn');
                    this.restartFromResultsBtn = document.getElementById('restartFromResultsBtn');
                    this.resultCharsMastered = document.getElementById('resultCharsMastered');
                    this.resultTotalMistakes = document.getElementById('resultTotalMistakes');
                    this.resultHintsShown = document.getElementById('resultHintsShown');
                }

                bindEvents() {
                    this.resetCanvasBtn.addEventListener('click', () => this.resetAllCanvases());
                    this.restartSessionBtn.addEventListener('click', () => this.restartSession());
                    this.restartFromResultsBtn.addEventListener('click', () => this.restartSession());
                    document.addEventListener('keydown', (event) => {
                        if (!this.resultsScreen.classList.contains('hidden')) {
                            if (event.key === 'Enter') this.restartSession();
                            return;
                        }
                        if (event.key === 'Backspace') {
                            event.preventDefault();
                            if (!this.isTransitioning) this.resetAllCanvases();
                        }
                    });
                }

                // ----- Custom Scrollbar Logic (now inside #charactersRow) -----
                initCustomScrollbar() {
                    if (!this.scrollContent) return;
                    // Listen to scroll events on .scroll-content
                    this.scrollContent.addEventListener('scroll', () => this.updateThumbPosition());
                    window.addEventListener('resize', () => this.checkOverflowAndUpdate());
                    
                    // Dragging logic on custom thumb
                    this.scrollbarThumb.addEventListener('mousedown', this.startDrag.bind(this));
                    document.addEventListener('mousemove', this.drag.bind(this));
                    document.addEventListener('mouseup', this.stopDrag.bind(this));
                    
                    // Click on track
                    this.scrollbarTrack.addEventListener('click', (e) => {
                        if (e.target === this.scrollbarThumb) return;
                        const rect = this.scrollbarTrack.getBoundingClientRect();
                        const clickX = e.clientX - rect.left;
                        const trackWidth = rect.width;
                        const scrollRatio = clickX / trackWidth;
                        const maxScroll = this.scrollContent.scrollWidth - this.scrollContent.clientWidth;
                        this.scrollContent.scrollLeft = scrollRatio * maxScroll;
                    });
                    
                    this.resizeObserver = new ResizeObserver(() => this.checkOverflowAndUpdate());
                    this.resizeObserver.observe(this.scrollContent);
                }

                checkOverflowAndUpdate() {
                    if (!this.scrollContent) return;
                    const hasOverflow = this.scrollContent.scrollWidth > this.scrollContent.clientWidth;
                    if (hasOverflow) {
                        this.customScrollbar.style.display = 'block';
                        this.updateThumbWidthAndPosition();
                    } else {
                        this.customScrollbar.style.display = 'none';
                    }
                }

                updateThumbWidthAndPosition() {
                    if (!this.scrollContent.clientWidth) return;
                    const scrollWidth = this.scrollContent.scrollWidth;
                    const clientWidth = this.scrollContent.clientWidth;
                    const trackWidth = this.scrollbarTrack.clientWidth;
                    const thumbWidth = Math.max(20, (clientWidth / scrollWidth) * trackWidth);
                    this.scrollbarThumb.style.width = `${thumbWidth}px`;
                    this.updateThumbPosition();
                }

                updateThumbPosition() {
                    const scrollWidth = this.scrollContent.scrollWidth;
                    const clientWidth = this.scrollContent.clientWidth;
                    const maxScrollLeft = scrollWidth - clientWidth;
                    const currentScrollLeft = this.scrollContent.scrollLeft;
                    const trackWidth = this.scrollbarTrack.clientWidth;
                    const thumbWidth = this.scrollbarThumb.clientWidth;
                    const maxThumbLeft = trackWidth - thumbWidth;
                    let thumbLeft = (currentScrollLeft / maxScrollLeft) * maxThumbLeft;
                    if (isNaN(thumbLeft)) thumbLeft = 0;
                    this.scrollbarThumb.style.left = `${thumbLeft}px`;
                }

                startDrag(e) {
                    e.preventDefault();
                    this.isDraggingThumb = true;
                    this.startDragX = e.clientX;
                    this.startThumbLeft = parseFloat(this.scrollbarThumb.style.left) || 0;
                }

                drag(e) {
                    if (!this.isDraggingThumb) return;
                    e.preventDefault();
                    const deltaX = e.clientX - this.startDragX;
                    const trackWidth = this.scrollbarTrack.clientWidth;
                    const thumbWidth = this.scrollbarThumb.clientWidth;
                    const maxLeft = trackWidth - thumbWidth;
                    let newLeft = this.startThumbLeft + deltaX;
                    newLeft = Math.min(Math.max(0, newLeft), maxLeft);
                    this.scrollbarThumb.style.left = `${newLeft}px`;
                    
                    const scrollWidth = this.scrollContent.scrollWidth;
                    const clientWidth = this.scrollContent.clientWidth;
                    const maxScrollLeft = scrollWidth - clientWidth;
                    const scrollRatio = newLeft / maxLeft;
                    this.scrollContent.scrollLeft = scrollRatio * maxScrollLeft;
                }

                stopDrag() {
                    this.isDraggingThumb = false;
                }

                cleanupCustomScrollbar() {
                    if (this.resizeObserver) {
                        this.resizeObserver.disconnect();
                        this.resizeObserver = null;
                    }
                    window.removeEventListener('resize', this.checkOverflowAndUpdate);
                }

                // ----- Core app methods (minimal changes to target .scrollContent) -----
                shuffleArray(arr) {
                    const a = [...arr];
                    for (let i = a.length - 1; i > 0; i--) {
                        const j = Math.floor(Math.random() * (i + 1));
                        [a[i], a[j]] = [a[j], a[i]];
                    }
                    return a;
                }

                startSession() {
                    this.originalDeck = this.shuffleArray(this.originalDeck);
                    this.wordCharacters = this.originalDeck.map(c => [...c.chinese]);
                    this.totalWords = this.originalDeck.length;

                    this.currentPhase = 1;
                    this.currentWordIndex = 0;
                    this.phase1Progress = this.wordCharacters.map(chars => new Array(chars.length).fill(0));
                    this.phase2Progress = this.wordCharacters.map(chars => new Array(chars.length).fill(0));
                    this.animationShown = new Array(this.totalWords).fill(false);

                    this.isAnimating = false;
                    this.isTransitioning = false;
                    this.totalMistakesAllTime = 0;
                    this.totalHintsShown = 0;

                    this.destroyAllWriters();
                    this.gameScreen.classList.remove('hidden');
                    this.resultsScreen.classList.add('hidden');
                    this.scrollContent.classList.remove('quiz-completed');
                    this.progressBar.style.width = '0%';
                    this.setupCurrentWord();
                }

                restartSession() {
                    this.destroyAllWriters();
                    this.cleanupCustomScrollbar();
                    this.initCustomScrollbar();
                    this.startSession();
                }

                getWriterDimensions() {
                    // Use the scrollContent width for better scaling
                    const containerWidth = this.scrollContent.clientWidth;
                    const w = Math.min(containerWidth * 0.95, 400);
                    return { width: w, height: w };
                }

                createWriter(container, char, showOutline) {
                    const dims = this.getWriterDimensions();
                    const hintThreshold = showOutline ? 3 : 1;
                    try {
                        return HanziWriter.create(container, char, {
                            width: dims.width,
                            height: dims.height,
                            padding: 5,
                            showOutline,
                            showCharacter: false,
                            strokeColor: '#555',
                            radicalColor: null,
                            drawingColor: '#333',
                            strokeAnimationSpeed: 1,
                            delayBetweenStrokes: 300,
                            showHintAfterMisses: hintThreshold,
                            highlightOnComplete: true
                        });
                    } catch (e) {
                        console.error('Create writer failed for', char, e);
                        return null;
                    }
                }

                destroyAllWriters() {
                    this.writers.forEach(w => {
                        try {
                            w.cancelQuiz();
                            w.cleanup();
                        } catch (e) {}
                    });
                    this.writers = [];
                    this.activeQuizzes = 0;
                    const containers = this.scrollContent.querySelectorAll('.char-canvas-container');
                    containers.forEach(c => {
                        c.innerHTML = '';
                    });
                }

                buildCharacterRow() {
                    this.scrollContent.innerHTML = '';
                    const chars = this.wordCharacters[this.currentWordIndex];
                    chars.forEach((char, idx) => {
                        const div = document.createElement('div');
                        div.className = 'char-canvas-container bg-white dark:bg-gray-800 rounded-lg shadow border border-gray-200 dark:border-gray-700';
                        div.id = `char-${idx}`;
                        this.scrollContent.appendChild(div);
                    });
                }

                startAllQuizzes() {
                    this.activeQuizzes = this.writers.length;
                    if (this.activeQuizzes === 0) {
                        this.handleAllQuizzesCompleted();
                        return;
                    }
                    this.writers.forEach(w => {
                        if (!w) return;
                        w.cancelQuiz();
                        w.quiz({
                            onMistake: (data) => {
                                if (this.isTransitioning) return;
                                this.totalMistakesAllTime++;
                                this.missCounter.classList.remove('hidden');
                                this.missCountSpan.textContent = this.totalMistakesAllTime;
                            },
                            onComplete: (summary) => {
                                if (this.isTransitioning) return;
                                this.activeQuizzes--;
                                if (this.activeQuizzes <= 0) {
                                    this.activeQuizzes = 0;
                                    this.handleAllQuizzesCompleted();
                                }
                            }
                        });
                    });
                }

                getOutlineForAttempt(attemptNumber) {
                    if (this.currentPhase === 1) return true;
                    else return (attemptNumber === 1);
                }

                getRemainingAttempts() {
                    const completed = this.currentPhase === 1 ?
                        (this.phase1Progress[this.currentWordIndex][0] || 0) :
                        (this.phase2Progress[this.currentWordIndex][0] || 0);
                    const maxAttempts = this.currentPhase === 1 ? this.PHASE1_MAX_ATTEMPTS : this.PHASE2_MAX_ATTEMPTS;
                    return maxAttempts - completed;
                }

                getCurrentAttemptNumber() {
                    const completed = this.currentPhase === 1 ?
                        (this.phase1Progress[this.currentWordIndex][0] || 0) :
                        (this.phase2Progress[this.currentWordIndex][0] || 0);
                    return completed + 1;
                }

                updateAttemptDisplay() {
                    const remaining = this.getRemainingAttempts();
                    const maxAttempts = this.currentPhase === 1 ? this.PHASE1_MAX_ATTEMPTS : this.PHASE2_MAX_ATTEMPTS;
                    const currentAttempt = this.getCurrentAttemptNumber();
                    if (remaining <= 0) {
                        this.attemptsDisplay.textContent = 'Completed';
                    } else {
                        this.attemptsDisplay.textContent = `Attempt ${currentAttempt}/${maxAttempts}`;
                    }
                }

                resetAllCanvases() {
                    if (this.writers.length === 0 || this.isTransitioning) return;
                    const chars = this.wordCharacters[this.currentWordIndex];
                    const containers = chars.map((_, i) => document.getElementById(`char-${i}`));
                    const attemptNumber = this.getCurrentAttemptNumber();
                    const showOutline = this.getOutlineForAttempt(attemptNumber);

                    this.writers.forEach(w => { try { w.cancelQuiz(); } catch(e) {} });
                    this.destroyAllWriters();
                    this.writers = [];

                    chars.forEach((ch, i) => {
                        const writer = this.createWriter(containers[i], ch, showOutline);
                        if (writer) this.writers.push(writer);
                    });
                    this.startAllQuizzes();
                    this.setMessage('🔄 Canvases reset. Keep trying!');
                    this.updateUI();
                }

                chainAnimations(index) {
                    if (index >= this.writers.length || !this.writers[index]) {
                        this.isAnimating = false;
                        this.animationShown[this.currentWordIndex] = true;
                        this.resetAllCanvases();
                        this.setMessage('✏️ Now draw all characters correctly.');
                        this.updateUI();
                        return;
                    }
                    const writer = this.writers[index];
                    try {
                        writer.animateCharacter({
                            onComplete: () => {
                                setTimeout(() => this.chainAnimations(index + 1), 100);
                            }
                        });
                    } catch (e) {
                        setTimeout(() => this.chainAnimations(index + 1), 100);
                    }
                }

                handleAllQuizzesCompleted() {
                    const wordIdx = this.currentWordIndex;
                    const charProgress = this.currentPhase === 1 ?
                        this.phase1Progress[wordIdx] :
                        this.phase2Progress[wordIdx];
                    for (let i = 0; i < charProgress.length; i++) charProgress[i]++;

                    const remaining = this.getRemainingAttempts();
                    this.isTransitioning = true;
                    this.resetCanvasBtn.disabled = true;
                    this.scrollContent.classList.add('quiz-completed');

                    setTimeout(() => {
                        this.isTransitioning = false;
                        this.resetCanvasBtn.disabled = false;
                        this.scrollContent.classList.remove('quiz-completed');
                        if (remaining <= 0) {
                            this.writers.forEach(w => { try { w.cancelQuiz(); } catch(e) {} });
                            this.currentWordIndex++;
                            this.destroyAllWriters();
                            this.setupCurrentWord();
                        } else {
                            this.setupCurrentWordAttempt();
                        }
                    }, 1500);
                }

                setupCurrentWord() {
                    if (this.currentWordIndex >= this.totalWords) {
                        if (this.currentPhase === 1) this.advanceToPhase2();
                        else this.showResults();
                        return;
                    }
                    this.updateWordDisplay();
                    this.buildCharacterRow();
                    this.destroyAllWriters();
                    this.writers = [];
                    this.activeQuizzes = 0;
                    const chars = this.wordCharacters[this.currentWordIndex];
                    const containers = chars.map((_, i) => document.getElementById(`char-${i}`));
                    const attemptNumber = this.getCurrentAttemptNumber();
                    const showOutline = this.getOutlineForAttempt(attemptNumber);

                    chars.forEach((ch, i) => {
                        const writer = this.createWriter(containers[i], ch, showOutline);
                        if (writer) this.writers.push(writer);
                    });

                    setTimeout(() => this.checkOverflowAndUpdate(), 50);

                    if (this.currentPhase === 1 && !this.animationShown[this.currentWordIndex]) {
                        this.isAnimating = true;
                        this.setMessage('🎬 Watching stroke order animation...');
                        this.chainAnimations(0);
                    } else {
                        this.startAllQuizzes();
                        this.setMessage('✏️ Draw all characters correctly.');
                        this.updateUI();
                    }
                }

                setupCurrentWordAttempt() {
                    const chars = this.wordCharacters[this.currentWordIndex];
                    const containers = chars.map((_, i) => document.getElementById(`char-${i}`));
                    this.destroyAllWriters();
                    this.writers = [];
                    this.activeQuizzes = 0;

                    const attemptNumber = this.getCurrentAttemptNumber();
                    const showOutline = this.getOutlineForAttempt(attemptNumber);

                    chars.forEach((ch, i) => {
                        const writer = this.createWriter(containers[i], ch, showOutline);
                        if (writer) this.writers.push(writer);
                    });
                    this.startAllQuizzes();
                    setTimeout(() => this.checkOverflowAndUpdate(), 50);
                    const outlineLabel = showOutline ? 'with outline' : 'without outline';
                    this.setMessage(`✏️ Attempt ${attemptNumber}/${this.currentPhase === 1 ? 2 : 2} – ${outlineLabel}.`);
                    this.updateUI();
                }

                updateWordDisplay() {
                    const word = this.originalDeck[this.currentWordIndex];
                    if (word) {
                        this.frenchDefinition.textContent = word.french || '';
                        this.pinyinDisplay.textContent = word.pinyin || '';
                    }
                }

                updateUI() {
                    let totalSteps = 0, completedSteps = 0;
                    for (let w = 0; w < this.totalWords; w++) {
                        const chars = this.wordCharacters[w];
                        totalSteps += chars.length * (this.PHASE1_MAX_ATTEMPTS + this.PHASE2_MAX_ATTEMPTS);
                        for (let c = 0; c < chars.length; c++) {
                            completedSteps += Math.min(this.phase1Progress[w][c], this.PHASE1_MAX_ATTEMPTS);
                            completedSteps += Math.min(this.phase2Progress[w][c], this.PHASE2_MAX_ATTEMPTS);
                        }
                    }
                    const pct = totalSteps ? Math.round((completedSteps / totalSteps) * 100) : 0;
                    this.progressBar.style.width = `${pct}%`;

                    this.wordCounter.textContent = `Word ${this.currentWordIndex + 1} / ${this.totalWords}`;
                    this.phaseIndicator.textContent = this.currentPhase === 1 ?
                        'Phase 1 – Outline' :
                        'Phase 2 – Mixed Outline';
                    this.phaseIndicator.className = `inline-block px-3 py-1 rounded-full text-xs font-semibold ${this.currentPhase === 1 ?
                        'bg-blue-100 dark:bg-blue-900 text-blue-700 dark:text-blue-300' :
                        'bg-purple-100 dark:bg-purple-900 text-purple-700 dark:text-purple-300'
                    } phase-pulse`;

                    this.updateAttemptDisplay();

                    if (this.totalMistakesAllTime > 0) {
                        this.missCounter.classList.remove('hidden');
                        this.missCountSpan.textContent = this.totalMistakesAllTime;
                    } else {
                        this.missCounter.classList.add('hidden');
                    }
                }

                setMessage(msg) {
                    if (this.messageArea) this.messageArea.textContent = msg;
                }

                advanceToPhase2() {
                    this.currentPhase = 2;
                    this.currentWordIndex = 0;
                    this.phase2Progress = this.wordCharacters.map(chars => new Array(chars.length).fill(0));
                    this.isAnimating = false;
                    this.destroyAllWriters();
                    this.scrollContent.classList.remove('quiz-completed');
                    this.setMessage('🎯 Phase 2 begins! Mixed outline practice.');
                    this.setupCurrentWord();
                }

                showResults() {
                    this.destroyAllWriters();
                    this.gameScreen.classList.add('hidden');
                    this.resultsScreen.classList.remove('hidden');
                    this.scrollContent.classList.remove('quiz-completed');
                    const totalChars = this.wordCharacters.reduce((sum, chars) => sum + chars.length, 0);
                    this.resultCharsMastered.textContent = totalChars;
                    this.resultTotalMistakes.textContent = this.totalMistakesAllTime;
                    this.resultHintsShown.textContent = this.totalHintsShown;
                    this.progressBar.style.width = '100%';
                    this.customScrollbar.style.display = 'none';
                }
            }

            new WritingPracticeApp(loadedFlashcards);
        }
    </script>
</body>
