<!DOCTYPE html>
<html>
<head>
    <title>P2P Chromebook Chat</title>
    <script src="https://unpkg.com"></script>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; height: 100vh; margin: 0; padding: 20px; box-sizing: border-box; }
        #chat { flex: 1; border: 1px solid #ccc; overflow-y: auto; padding: 10px; margin-bottom: 10px; background: #f9f9f9; }
        .controls { display: flex; gap: 10px; margin-bottom: 10px; }
        input { padding: 8px; flex: 1; }
        button { padding: 8px 15px; cursor: pointer; background: #4285f4; color: white; border: none; border-radius: 4px; }
    </style>
</head>
<body>
    <h2>Your ID: <span id="my-id">...</span></h2>
    
    <div class="controls">
        <input type="text" id="receiver-id" placeholder="Paste Friend's ID here">
        <button onclick="connectToPeer()">Connect & Chat</button>
    </div>

    <div id="chat"></div>

    <div class="controls">
        <input type="text" id="message-input" placeholder="Type a message...">
        <button onclick="sendMessage()">Send</button>
    </div>

    <script>
        const peer = new Peer(); // Connects to the public PeerJS handshake server
        let conn;

        // Display your ID so you can share it
        peer.on('open', (id) => {
            document.getElementById('my-id').innerText = id;
        });

        // Listen for incoming connections (Friend connects to you)
        peer.on('connection', (connection) => {
            conn = connection;
            setupChat();
        });

        // Function to initiate connection (You connect to friend)
        function connectToPeer() {
            const remoteId = document.getElementById('receiver-id').value;
            conn = peer.connect(remoteId);
            setupChat();
        }

        function setupChat() {
            conn.on('data', (data) => {
                appendMessage("Friend: " + data);
            });
            conn.on('open', () => {
                appendMessage("--- Connected ---");
            });
        }

        function sendMessage() {
            const msg = document.getElementById('message-input').value;
            if (conn && conn.open) {
                conn.send(msg);
                appendMessage("You: " + msg);
                document.getElementById('message-input').value = "";
            }
        }

        function appendMessage(text) {
            const chat = document.getElementById('chat');
            chat.innerHTML += `<div>${text}</div>`;
            chat.scrollTop = chat.scrollHeight;
        }
    </script>
</body>
</html>
