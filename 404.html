<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Redirection · 404</title>
  <!-- PRESERVED EXACT STYLES from original 404 page -->
  <style type="text/css" media="screen">
    .container {
      margin: 10px auto;
      max-width: 600px;
      text-align: center;
    }
    h1 {
      margin: 30px 0;
      font-size: 4em;
      line-height: 1;
      letter-spacing: -1px;
    }
    /* extra small touch: ensure body has natural background & spacing like original */
    body {
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      margin: 0;
      padding: 20px;
      background: #fff; /* neutral, matches original feel */
    }
    /* preserve any original spacing for the <h2> message */
    h2 {
      font-size: 1.3rem;
      font-weight: normal;
      margin-top: 1rem;
    }
  </style>
  <!-- ORIGINAL countdown script (unchanged logic) -->
  <script>
    var countdown = 3;
    var redirectTimer;

    function startRedirect() {
      redirectTimer = setInterval(function() {
        countdown--;
        document.getElementById("countdown").textContent = countdown;
        if (countdown === 0) {
          clearInterval(redirectTimer);
          window.location.href = "https://timothee123456.github.io/main";
        }
      }, 1000);
    }
  </script>
  <!-- CONDITIONAL IMMEDIATE REDIRECTION ENGINE (executes first, before body load) -->
  <script>
    (function() {
      // get current path from browser
      var currentPath = window.location.pathname;
      var currentSearch = window.location.search || "";
      var currentHash = window.location.hash || "";
      
      // regex: exactly matches /p/anything OR /presentation/anything
      // captures the full "anything" part (including subfolders, trailing slashes, etc.)
      var match = currentPath.match(/^\/(p|presentation)\/(.*)$/);
      
      if (match) {
        // ----- SPECIAL CASE: /p/... or /presentation/... → immediate redirect (no countdown) -----
        var anything = match[2];   // everything after the first slash after /p/ or /presentation/
        var targetBase = "https://timothee1234567.pythonanywhere.com/";
        // build new URL with the exact 'anything' path
        var newUrl = targetBase + anything;
        // preserve query parameters and hash if present (to keep identical behavior)
        if (currentSearch) newUrl += currentSearch;
        if (currentHash) newUrl += currentHash;
        
        // perform instant redirect; stops further page rendering
        window.location.replace(newUrl);
        // early termination: the rest of the page will not be visible because navigation starts immediately
        // but we also prevent any countdown timer from being set
        throw new Error("immediate_redirect_abort"); // stop script execution
      }
      // For normal 404 errors: do nothing here, original countdown will run on body load.
    })();
  </script>
</head>
<!-- Original body onload: startRedirect() will only execute for non-matching URLs -->
<body onload="startRedirect()">
  <!-- EXACT ORIGINAL HTML STRUCTURE (container, h1, paragraph, and h2 with countdown) -->
  <div class="container">
    <h1>404</h1>
    <p><strong>Page not found :(</strong></p>
    <p>The requested page could not be found.</p>
  </div>
  <h2>You will be redirected to another page in <span id="countdown">3</span> seconds...</h2>
</body>
</html>
