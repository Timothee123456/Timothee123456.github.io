<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>P2P Chromebook Chat (Local Version)</title>
    <!-- STEP 1: LOAD THE LIBRARY LOCALLY FROM YOUR OWN REPO OR EMBEDDED -->
    <!-- Since remote CDNs are blocked, we use a fallback check -->
    <script src="https://cdnjs.cloudflare.com"></script>
    
    <style>
        body { font-family: sans-serif; background: #121212; color: white; padding: 20px; display: flex; flex-direction: column; height: 95vh; }
        #chat { flex: 1; border: 1px solid #333; background: #000; overflow-y: auto; padding: 10px; margin: 10px 0; border-radius: 8px; }
        .controls { display: flex; gap: 10px; margin-bottom: 10px; }
        input { padding: 10px; border-radius: 5px; border: 1px solid #444; background: #222; color: white; flex: 1; }
        button { padding: 10px; cursor: pointer; background: #007bff; color: white; border: none; border-radius: 5px; }
        #debug-log { font-size: 10px; color: #555; height: 50px; overflow: auto; border-top: 1px solid #333; padding-top: 5px; }
        .error { color: #ff4444; }
        .success { color: #00ff00; }
    </style>
</head>
<body>

    <h2>Chat Status: <span id="status" class="error">Offline</span></h2>
    <div>Your ID: <strong id="my-id">---</strong></div>

    <div class="controls" style="margin-top:20px;">
        <input type="text" id="receiver-id" placeholder="Friend's ID">
        <button id="connect-btn">Connect to Friend</button>
    </div>

    <div id="chat"></div>

    <div class="controls">
        <input type="text" id="message-input" placeholder="Type here...">
        <button id="send-btn">Send</button>
    </div>

    <div id="debug-log">Debug info will appear here...</div>

    <script>
        function log(msg, isError = false) {
            const d = document.getElementById('debug-log');
            d.innerHTML += `<div class="${isError ? 'error' : ''}">[${new Date().toLocaleTimeString()}] ${msg}</div>`;
            d.scrollTop = d.scrollHeight;
        }

        window.onload = () => {
            log("Page Loaded. Checking PeerJS...");

            // Check if library loaded
            if (typeof Peer === 'undefined') {
                log("CRITICAL ERROR: PeerJS Library was blocked by your school filter!", true);
                document.getElementById('status').innerText = "LIBRARY BLOCKED";
                return;
            }

            log("PeerJS Library found. Initializing...");
            
            const peer = new Peer();
            let conn = null;

            peer.on('open', (id) => {
                document.getElementById('my-id').innerText = id;
                document.getElementById('status').innerText = "Online & Ready";
                document.getElementById('status').className = "success";
                log("Connected to PeerServer. ID: " + id);
            });

            peer.on('error', (err) => {
                log("Peer Error: " + err.type, true);
                if(err.type === 'peer-unavailable') log("Error: Friend's ID not found.", true);
            });

            // Handling Inbound
            peer.on('connection', (c) => {
                conn = c;
                log("Incoming connection from: " + conn.peer);
                setupChat();
            });

            // Handling Outbound
            document.getElementById('connect-btn').onclick = () => {
                const rid = document.getElementById('receiver-id').value;
                log("Attempting to connect to: " + rid);
                conn = peer.connect(rid);
                setupChat();
            };

            function setupChat() {
                conn.on('open', () => {
                    log("Handshake complete. Connection Open.");
                    appendMsg("System", "Connected!");
                });
                conn.on('data', (data) => {
                    appendMsg("Friend", data);
                });
            }

            document.getElementById('send-btn').onclick = () => {
                const val = document.getElementById('message-input').value;
                if (conn && conn.open) {
                    conn.send(val);
                    appendMsg("You", val);
                    document.getElementById('message-input').value = "";
                } else {
                    log("Send failed: No open connection.", true);
                }
            };

            function appendMsg(sender, text) {
                document.getElementById('chat').innerHTML += `<div><strong>${sender}:</strong> ${text}</div>`;
            }
        };
    </script>
</body>
</html>
