<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pure JS PowerPoint Compressor (Debug Mode)</title>
    <script src="https://cloudflare.com"></script>
    <style>
        body { font-family: sans-serif; padding: 40px; text-align: center; background: #f4f4f9; }
        .box { border: 2px dashed #007acc; padding: 40px; background: white; border-radius: 8px; display: inline-block; max-width: 600px; width: 100%; }
        #status { margin-top: 20px; font-weight: bold; color: #333; }
        #debugConsole { margin-top: 20px; padding: 15px; background: #222; color: #00ff00; font-family: monospace; text-align: left; font-size: 12px; border-radius: 4px; max-height: 250px; overflow-y: auto; display: none;}
        button { padding: 10px 20px; font-size: 16px; cursor: pointer; display: none; margin: 20px auto; background: #007acc; color: white; border: none; border-radius: 4px;}
    </style>
</head>
<body>

    <div class="box">
        <h2>PPTX Compressor (Debug Mode)</h2>
        <p>Upload your file. Check both this screen and your browser's F12 console.</p>
        <input type="file" id="upload" accept=".pptx">
        <div id="status">Ready.</div>
        <button id="downloadBtn">Download Compressed PPTX</button>
        <div id="debugConsole"></div>
    </div>

    <script>
        const uploadInput = document.getElementById('upload');
        const statusDiv = document.getElementById('status');
        const downloadBtn = document.getElementById('downloadBtn');
        const debugConsole = document.getElementById('debugConsole');
        let compressedBlob = null;

        function logDebug(message, isError = false) {
            console.log(`[DEBUG] ${message}`);
            debugConsole.style.display = "block";
            const timestamp = new Date().toISOString().split('T')[1].slice(0, -1);
            const prefix = isError ? `<span style="color: #ff3333;">[ERROR ${timestamp}]</span> ` : `<span>[${timestamp}]</span> `;
            debugConsole.innerHTML += `${prefix}${message}<br>`;
            debugConsole.scrollTop = debugConsole.scrollHeight;
        }

        uploadInput.addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            // Reset UI
            debugConsole.innerHTML = "";
            statusDiv.innerText = "Processing started...";
            statusDiv.style.color = "#333";
            downloadBtn.style.display = "none";

            logDebug(`File selected: "${file.name}"`);
            logDebug(`File size: ${file.size} bytes (~ ${(file.size/1024/1024).toFixed(2)} MB)`);
            logDebug(`Mime-type reported by browser: "${file.type}"`);

            try {
                const zip = new JSZip();
                
                logDebug("Attempting to parse file with JSZip...");
                const loadedZip = await zip.loadAsync(file);
                logDebug("Successfully read file structure as a ZIP archive.");

                // Print root folders to see what kind of zip this is
                const rootFiles = Object.keys(loadedZip.files).filter(k => !k.includes('/'));
                logDebug(`Root elements found in ZIP: [${rootFiles.join(', ')}]`);

                const mediaFolder = loadedZip.folder("ppt/media");
                if (!mediaFolder) {
                    logDebug("Checked path 'ppt/media/'. Folder does not exist in this archive.", true);
                    statusDiv.innerText = "Error: 'ppt/media' folder missing. Is this a real PPTX file?";
                    statusDiv.style.color = "red";
                    return;
                }

                const filePromises = [];
                logDebug("Scanning 'ppt/media/' folder for image contents...");

                mediaFolder.forEach((relativePath, fileEntry) => {
                    logDebug(`Found asset: ppt/media/${relativePath} (Compressed size: ${fileEntry._data.compressedSize} bytes)`);
                    
                    if (relativePath.match(/\.(jpg|jpeg|png)$/i)) {
                        logDebug(`Targeting image for compression: ${relativePath}`);
                        
                        const promise = fileEntry.async("blob")
                            .then(async (imageBlob) => {
                                logDebug(`Extracted blob for ${relativePath}. Initializing canvas compression...`);
                                const compressedImgBlob = await compressImage(imageBlob, relativePath);
                                logDebug(`Successfully compressed ${relativePath}. Swapping archive binary reference.`);
                                zip.file(`ppt/media/${relativePath}`, compressedImgBlob);
                            })
                            .catch(err => {
                                logDebug(`Failed extracting blob for ${relativePath}: ${err.message}`, true);
                                throw err;
                            });
                        filePromises.push(promise);
                    }
                });

                if (filePromises.length === 0) {
                    logDebug("Finished scanning media. Zero compatible JPG/PNG files found.", true);
                    statusDiv.innerText = "No optimizable images found in this PowerPoint file.";
                    return;
                }

                logDebug(`Awaiting optimization queues for ${filePromises.length} target images...`);
                await Promise.all(filePromises);
                logDebug("All target images processed successfully.");

                statusDiv.innerText = "Packing structural contents back together...";
                logDebug("Generating target binary presentation blob...");
                
                compressedBlob = await zip.generateAsync({ type: "blob" });
                logDebug(`Compilation complete. Final size: ${(compressedBlob.size/1024/1024).toFixed(2)} MB`);
                
                statusDiv.innerText = `Done! Size: ${(compressedBlob.size/1024/1024).toFixed(2)}MB`;
                downloadBtn.style.display = "block";

                downloadBtn.onclick = () => {
                    const url = URL.createObjectURL(compressedBlob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = `compressed_${file.name}`;
                    a.click();
                    URL.revokeObjectURL(url);
                    logDebug("Download triggered by user.");
                };

            } catch (error) {
                logDebug(`CRITICAL UNCAUGHT ERROR: ${error.message}`, true);
                console.error("Full exception stack trace:", error);
                statusDiv.innerText = `An error occurred while parsing the presentation file: "${error.message}"`;
                statusDiv.style.color = "red";
            }
        });

        function compressImage(blob, filename) {
            return new Promise((resolve) => {
                const img = new Image();
                const objectUrl = URL.createObjectURL(blob);
                img.src = objectUrl;
                
                img.onload = () => {
                    logDebug(`Canvas loaded image geometry for ${filename}: ${img.width}x${img.height}px`);
                    const canvas = document.createElement('canvas');
                    const ctx = canvas.getContext('2d');

                    canvas.width = img.width;
                    canvas.height = img.height;
                    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);

                    canvas.toBlob((newBlob) => {
                        URL.revokeObjectURL(objectUrl);
                        if (newBlob) {
                            logDebug(`Reduced image asset size: ${blob.size} bytes -> ${newBlob.size} bytes`);
                            resolve(newBlob);
                        } else {
                            logDebug(`Canvas export failed for ${filename}. Keeping original resource.`, true);
                            resolve(blob);
                        }
                    }, 'image/jpeg', 0.5); 
                };

                img.onerror = (err) => {
                    logDebug(`DOM Image rendering engine failed parsing layout for ${filename}`, true);
                    URL.revokeObjectURL(objectUrl);
                    resolve(blob); // Fallback to avoid stopping the loop
                };
            });
        }
    </script>
</body>
</html>
