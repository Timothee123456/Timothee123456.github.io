<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title id="pageTitle">Chinese Writing Practice</title>
    <script src="https://cdn.tailwindcss.com">
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <script src="https://cdn.jsdelivr.net/npm/hanzi-writer@2.2.1/dist/hanzi-writer.min.js">
    </script>
    <style>
        /* Fade‑in animation for hints and messages */
        .hint-fade-in {
            animation: fadeIn 0.2s ease-in-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: scale(0.95);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        /* Prevent accidental text selection on touch */
        .no-select {
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        /* Writer container – keeps the canvas centered and responsive */
        #writer-target {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 280px;
            width: 100%;
        }

        #writer-target canvas {
            max-width: 100%;
            height: auto !important;
            border-radius: 0.75rem;
        }

        @media (max-width: 640px) {
            #writer-target {
                min-height: 220px;
            }
        }

        @media (max-width: 400px) {
            #writer-target {
                min-height: 180px;
            }
        }

        /* Pulsing effect for the phase indicator */
        .phase-pulse {
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%,
            100% {
                opacity: 1;
            }
            50% {
                opacity: 0.6;
            }
        }
    </style>
</head>

<body class="bg-gray-100 dark:bg-gray-900 min-h-screen transition-colors">
    <!-- Dark mode detection (preserved from original) -->
    <script>
        if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
            document.documentElement.classList.add('dark');
        }
        window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', event => {
            if (event.matches) {
                document.documentElement.classList.add('dark');
            } else {
                document.documentElement.classList.remove('dark');
            }
        });
    </script>

    <div class="container mx-auto px-3 py-4 max-w-2xl">
        <!-- Title -->
        <h1 id="title" class="text-2xl sm:text-3xl font-bold text-center mb-4 text-gray-800 dark:text-white">
            Chinese Writing Practice
        </h1>

        <!-- Game Screen -->
        <div id="gameScreen" class="space-y-4 sm:space-y-6">
            <!-- Progress Bar -->
            <div class="w-full bg-gray-200 dark:bg-gray-700 rounded-full h-3 overflow-hidden">
                <div id="progressBar" class="bg-blue-500 h-3 rounded-full transition-all duration-300"
                style="width: 0%"></div>
            </div>

            <!-- Info Row: Phase, Word counter, Attempts, Misses, Restart -->
            <div class="flex flex-wrap justify-between items-center gap-2 text-sm">
                <div class="flex items-center space-x-2">
                    <span id="phaseIndicator"
                    class="inline-block px-3 py-1 rounded-full text-xs font-semibold bg-blue-100 dark:bg-blue-900 text-blue-700 dark:text-blue-300 phase-pulse">
                    Phase 1
                </span>
                <span id="wordCounter" class="text-gray-600 dark:text-gray-400 font-medium">
                    Word 1 / 20
                </span>
            </div>
            <div class="flex items-center space-x-3">
                <span id="attemptsRemaining" class="text-gray-600 dark:text-gray-400">
                    3 attempts remaining
                </span>
                <span id="missCounter" class="text-orange-500 dark:text-orange-400 font-medium hidden">
                    <i class="fa fa-exclamation-triangle"></i> <span id="missCount">0</span> misses
                </span>
            </div>
            <button id="restartSessionBtn"
            class="bg-gray-200 dark:bg-gray-700 hover:bg-gray-300 dark:hover:bg-gray-600 text-gray-700 dark:text-gray-300 px-3 py-2 rounded-lg font-medium transition-colors text-sm"
            title="Restart Session">
            <i class="fa fa-refresh"></i> Restart
        </button>
    </div>

    <!-- Word Info Card: Definition (French) + Pinyin -->
    <div class="bg-white dark:bg-gray-800 rounded-xl shadow-lg border border-gray-200 dark:border-gray-700 p-4 sm:p-6 text-center">
        <div id="frenchDefinition"
        class="text-2xl sm:text-3xl font-bold text-gray-800 dark:text-white mb-2">
        Loading...
    </div>
    <div id="pinyinDisplay"
    class="text-lg sm:text-xl text-gray-600 dark:text-gray-400">
    Loading...
</div>
</div>

<!-- HanziWriter Canvas Container -->
<div class="bg-white dark:bg-gray-800 rounded-xl shadow-lg border border-gray-200 dark:border-gray-700 p-2 sm:p-4 flex items-center justify-center">
    <div id="writer-target"></div>
</div>

<!-- Message area (animation status / score feedback) -->
<div id="messageArea" class="text-center text-sm text-gray-500 dark:text-gray-400 min-h-[24px]">
</div>

<!-- Action Buttons -->
<div class="flex justify-center space-x-4 px-2">
    <button id="checkBtn"
    class="flex-1 max-w-44 flex items-center justify-center space-x-2 bg-green-500 hover:bg-green-600 active:bg-green-700 text-white px-4 py-4 rounded-lg font-semibold transition-colors min-h-[56px] text-base disabled:opacity-50 disabled:cursor-not-allowed"
    disabled>
    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
        d="M5 13l4 4L19 7"></path>
    </svg>
    <span>Check</span>
</button>

<button id="resetCanvasBtn"
class="flex-1 max-w-44 flex items-center justify-center space-x-2 bg-gray-400 hover:bg-gray-500 active:bg-gray-600 text-white px-4 py-4 rounded-lg font-semibold transition-colors min-h-[56px] text-base">
<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
    d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path>
</svg>
<span>Reset</span>
</button>
</div>
</div>

<!-- Results Screen -->
<div id="resultsScreen" class="hidden text-center space-y-4 sm:space-y-6 px-2">
    <h2 class="text-xl sm:text-2xl font-bold text-gray-800 dark:text-white mb-4 sm:mb-6">
        🎉 Congratulations! 🎉
    </h2>

    <div class="bg-white dark:bg-gray-800 rounded-xl p-4 sm:p-6 shadow-lg border border-gray-200 dark:border-gray-700">
        <p class="text-gray-600 dark:text-gray-400 mb-4">
            You have completed both phases of writing practice!
        </p>
        <div class="grid grid-cols-2 gap-4 mb-4 sm:mb-6">
            <div class="text-center">
                <div id="resultCharsMastered" class="text-2xl sm:text-3xl font-bold text-green-500">0</div>
                <div class="text-sm text-gray-600 dark:text-gray-400">Characters Mastered</div>
            </div>
            <div class="text-center">
                <div id="resultTotalMistakes" class="text-2xl sm:text-3xl font-bold text-orange-500">0</div>
                <div class="text-sm text-gray-600 dark:text-gray-400">Total Mistakes</div>
            </div>
        </div>
        <div class="text-center">
            <div id="resultHintsShown" class="text-2xl sm:text-3xl font-bold text-blue-500">0</div>
            <div class="text-sm text-gray-600 dark:text-gray-400">Hints Shown</div>
        </div>
    </div>

    <div class="space-y-3">
        <button id="restartFromResultsBtn"
        class="w-full bg-blue-500 hover:bg-blue-600 active:bg-blue-700 text-white px-6 py-4 rounded-lg font-semibold transition-colors min-h-[56px] text-base">
        <i class="fa fa-refresh mr-2"></i> Restart Session
    </button>
    <a href="/home"
    class="block w-full bg-gray-300 dark:bg-gray-700 hover:bg-gray-400 dark:hover:bg-gray-600 text-gray-700 dark:text-gray-300 px-6 py-4 rounded-lg font-semibold transition-colors min-h-[56px] text-base text-center no-underline">
    <i class="fa fa-home mr-2"></i> Choose Another Deck
</a>
</div>
</div>
</div>

<script>
    // ──────────────────────────────────────
    // DECK LOADING (preserved from original)
    // ──────────────────────────────────────
    const urlParams = new URLSearchParams(window.location.search);
    const deckName = urlParams.get('deck');

    async function load_flashcards() {
        if (deckName) {
            const flashcardsFile = `${deckName}.js`;
            const jsFileURL = `./decks/${flashcardsFile}`;
            try {
                const module = await import(jsFileURL);
                const flashcards = module.flashcards;
                if (flashcards === undefined) {
                    window.location.href = "/home";
                    return;
                }
                let defaultName = 'Chinese Writing Practice';
                let titleText = (module.title ? module.title + ' - ' : '') + defaultName;
                if (!module.title) {
                    titleText = defaultName;
                }
                document.getElementById('title').textContent = titleText;
                document.getElementById('pageTitle').textContent = titleText;
                initializeApp(flashcards);
            } catch (err) {
                console.error('Failed to load deck:', err);
                window.location.href = "/home";
            }
        } else {
            window.location.href = "/home";
        }
    }

    load_flashcards();

    // ──────────────────────────────────────
    // MAIN APP CLASS
    // ──────────────────────────────────────
    function initializeApp(loadedFlashcards) {
        class WritingPracticeApp {
            /**
             * @param {Array<{chinese: string, pinyin: string, french: string}>} flashcards
             */
            constructor(flashcards) {
                // Store the original deck and expand multi‑character words into
                // individual single‑character entries for HanziWriter.
                this.originalDeck = Array.isArray(flashcards) ? flashcards : [];
                this.expandDeck();

                // Phase tracking
                this.currentPhase = 1;                // 1 or 2
                this.currentWordIndex = 0;

                // Per‑character attempt counters (filled after expansion)
                this.phase1AttemptsDone = new Array(this.totalWords).fill(0);
                this.phase2AttemptsDone = new Array(this.totalWords).fill(0);
                this.animationShown = new Array(this.totalWords).fill(false);

                // Writer & UI state
                this.writer = null;
                this.currentMisses = 0;
                this.isAnimating = false;
                // Track the current outline setting so we can recreate the writer
                // after reset or animation when necessary.
                this.currentShowOutline = false;

                // Global stats for the results screen
                this.totalMistakesAllTime = 0;
                this.totalHintsShown = 0;

                // DOM references
                this.cacheDom();
                this.bindEvents();
                this.startSession();
            }

            /**
             * Split every flashcard entry into one entry per character.
             * Keeps the same pinyin & french for each character,
             * so the learner sees the word's meaning while practising each character.
             */
            expandDeck() {
                this.flashcards = [];
                for (const card of this.originalDeck) {
                    const chars = [...card.chinese]; // splits emoji‑safe
                    for (const ch of chars) {
                        this.flashcards.push({
                            chinese: ch,
                            pinyin: card.pinyin,
                            french: card.french
                        });
                    }
                }
                this.totalWords = this.flashcards.length;
            }

            // ──────────────────────────────────
            // DOM CACHING
            // ──────────────────────────────────
            cacheDom() {
                this.gameScreen = document.getElementById('gameScreen');
                this.resultsScreen = document.getElementById('resultsScreen');
                this.progressBar = document.getElementById('progressBar');
                this.phaseIndicator = document.getElementById('phaseIndicator');
                this.wordCounter = document.getElementById('wordCounter');
                this.attemptsRemaining = document.getElementById('attemptsRemaining');
                this.missCounter = document.getElementById('missCounter');
                this.missCountSpan = document.getElementById('missCount');
                this.frenchDefinition = document.getElementById('frenchDefinition');
                this.pinyinDisplay = document.getElementById('pinyinDisplay');
                this.writerTarget = document.getElementById('writer-target');
                this.messageArea = document.getElementById('messageArea');
                this.checkBtn = document.getElementById('checkBtn');
                this.resetCanvasBtn = document.getElementById('resetCanvasBtn');
                this.restartSessionBtn = document.getElementById('restartSessionBtn');
                this.restartFromResultsBtn = document.getElementById('restartFromResultsBtn');
                this.resultCharsMastered = document.getElementById('resultCharsMastered');
                this.resultTotalMistakes = document.getElementById('resultTotalMistakes');
                this.resultHintsShown = document.getElementById('resultHintsShown');
            }

            // ──────────────────────────────────
            // EVENT BINDING
            // ──────────────────────────────────
            bindEvents() {
                this.checkBtn.addEventListener('click', () => this.handleCheck());
                this.resetCanvasBtn.addEventListener('click', () => this.handleResetCanvas());
                this.restartSessionBtn.addEventListener('click', () => this.restartSession());
                this.restartFromResultsBtn.addEventListener('click', () => this.restartSession());

                // Keyboard shortcuts (Enter = Check, Backspace = Reset)
                document.addEventListener('keydown', (event) => {
                    if (this.resultsScreen.classList.contains('hidden') === false) {
                        if (event.key === 'Enter') this.restartSession();
                        return;
                    }
                    if (event.key === 'Enter') {
                        event.preventDefault();
                        this.handleCheck();
                    } else if (event.key === 'Backspace') {
                        event.preventDefault();
                        this.handleResetCanvas();
                    }
                });
            }

            // ──────────────────────────────────
            // SESSION MANAGEMENT
            // ──────────────────────────────────
            shuffleArray(array) {
                const shuffled = [...array];
                for (let i = shuffled.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
                }
                return shuffled;
            }

            startSession() {
                // Shuffle the original deck and re‑expand
                this.originalDeck = this.shuffleArray(this.originalDeck);
                this.expandDeck();

                this.currentPhase = 1;
                this.currentWordIndex = 0;
                this.phase1AttemptsDone = new Array(this.totalWords).fill(0);
                this.phase2AttemptsDone = new Array(this.totalWords).fill(0);
                this.animationShown = new Array(this.totalWords).fill(false);
                this.currentMisses = 0;
                this.isAnimating = false;
                this.totalMistakesAllTime = 0;
                this.totalHintsShown = 0;
                this.currentShowOutline = false;

                this.destroyWriter();
                this.gameScreen.classList.remove('hidden');
                this.resultsScreen.classList.add('hidden');
                this.progressBar.style.width = '0%';
                this.setupCurrentWord();
            }

            restartSession() {
                this.destroyWriter();
                this.startSession();
            }

            // ──────────────────────────────────
            // WRITER MANAGEMENT
            // ──────────────────────────────────
            getWriterDimensions() {
                const vw = window.innerWidth;
                if (vw < 400) return { width: 180, height: 180 };
                if (vw < 640) return { width: 230, height: 230 };
                return { width: 280, height: 280 };
            }

            /**
             * Creates a HanziWriter for the current single character.
             * Stores the outline setting in this.currentShowOutline so that
             * we can safely recreate the writer when needed (e.g., after a reset).
             * @param {boolean} showOutline – whether the outline skeleton is shown
             * @returns {boolean} success
             */
            createWriter(showOutline) {
                this.destroyWriter();
                this.writerTarget.innerHTML = '';

                const char = this.getCurrentCharacter();
                if (!char) {
                    this.setMessage('⚠️ No character to load. Skipping...');
                    return false;
                }

                const dims = this.getWriterDimensions();
                this.currentMisses = 0;
                this.currentShowOutline = showOutline;
                this.updateMissDisplay();

                const options = {
                    width: dims.width,
                    height: dims.height,
                    padding: 5,
                    showOutline: showOutline,
                    strokeColor: '#555',
                    radicalColor: null,
                    // HanziWriter will automatically show a hint after 3 misses
                    showHintAfterMisses: 3,
                    onMistake: (strokeData) => {
                        this.currentMisses++;
                        this.totalMistakesAllTime++;
                        this.updateMissDisplay();
                        if (this.currentMisses === 3) {
                            this.totalHintsShown++;
                        }
                    },
                    onComplete: () => {
                        this.setMessage('All strokes drawn – click "Check" to evaluate.');
                    }
                };

                try {
                    this.writer = HanziWriter.create(this.writerTarget, char, options);
                    return true;
                } catch (err) {
                    console.error('HanziWriter creation failed for', char, err);
                    this.writer = null;
                    return false;
                }
            }

            /**
             * Destroy the current writer and clean up.
             */
            destroyWriter() {
                if (this.writer) {
                    try { this.writer.cleanup(); } catch (e) {}
                    this.writer = null;
                }
                if (this.writerTarget) {
                    this.writerTarget.innerHTML = '';
                }
                this.currentMisses = 0;
            }

            /**
             * Safe way to clear the canvas: destroy and recreate the writer
             * using the same outline setting. This avoids calling writer.erase()
             * directly, which may not be available in all HanziWriter builds.
             */
            safeClearCanvas() {
                if (!this.writer) return;
                // Store the current outline setting
                const outline = this.currentShowOutline;
                this.destroyWriter();
                this.createWriter(outline);
                this.updateUI();
            }

            // ──────────────────────────────────
            // CHARACTER & WORD HELPERS
            // ──────────────────────────────────
            getCurrentCharacter() {
                if (this.currentWordIndex < this.totalWords && this.flashcards[this.currentWordIndex]) {
                    return this.flashcards[this.currentWordIndex].chinese || '';
                }
                return '';
            }

            getCurrentWord() {
                return this.flashcards[this.currentWordIndex] || null;
            }

            // ──────────────────────────────────
            // UI UPDATES
            // ──────────────────────────────────
            updateUI() {
                const totalSteps = this.totalWords * 6; // 3 Phase 1 + 3 Phase 2
                let completed = 0;
                for (let i = 0; i < this.totalWords; i++) {
                    completed += Math.min(this.phase1AttemptsDone[i], 3);
                    completed += Math.min(this.phase2AttemptsDone[i], 3);
                }
                const pct = totalSteps > 0 ? Math.round((completed / totalSteps) * 100) : 0;
                this.progressBar.style.width = `${pct}%`;

                this.wordCounter.textContent =
                    `Word ${this.currentWordIndex + 1} / ${this.totalWords}`;

                if (this.currentPhase === 1) {
                    this.phaseIndicator.textContent = 'Phase 1 – Outline & Animation';
                    this.phaseIndicator.className =
                        'inline-block px-3 py-1 rounded-full text-xs font-semibold bg-blue-100 dark:bg-blue-900 text-blue-700 dark:text-blue-300 phase-pulse';
                } else {
                    this.phaseIndicator.textContent = 'Phase 2 – Mixed Outline';
                    this.phaseIndicator.className =
                        'inline-block px-3 py-1 rounded-full text-xs font-semibold bg-purple-100 dark:bg-purple-900 text-purple-700 dark:text-purple-300 phase-pulse';
                }

                const remaining = this.getRemainingAttempts();
                this.attemptsRemaining.textContent =
                    `${remaining} attempt${remaining !== 1 ? 's' : ''} remaining`;

                this.updateMissDisplay();
                this.checkBtn.disabled = this.isAnimating || !this.writer;
            }

            getRemainingAttempts() {
                if (this.currentPhase === 1) {
                    return 3 - (this.phase1AttemptsDone[this.currentWordIndex] || 0);
                }
                return 3 - (this.phase2AttemptsDone[this.currentWordIndex] || 0);
            }

            updateMissDisplay() {
                if (this.currentMisses > 0) {
                    this.missCounter.classList.remove('hidden');
                    this.missCountSpan.textContent = this.currentMisses;
                } else {
                    this.missCounter.classList.add('hidden');
                    this.missCountSpan.textContent = '0';
                }
            }

            setMessage(msg) {
                if (this.messageArea) this.messageArea.textContent = msg;
            }

            updateWordDisplay() {
                const word = this.getCurrentWord();
                if (word) {
                    this.frenchDefinition.textContent = word.french || '';
                    this.pinyinDisplay.textContent = word.pinyin || '';
                }
            }

            // ──────────────────────────────────
            // PHASE & ATTEMPT LOGIC
            // ──────────────────────────────────
            setupCurrentWord() {
                if (this.currentWordIndex >= this.totalWords) {
                    if (this.currentPhase === 1) {
                        this.advanceToPhase2();
                    } else {
                        this.showResults();
                    }
                    return;
                }

                this.updateWordDisplay();

                if (this.currentPhase === 1) {
                    this.setupPhase1Word();
                } else {
                    this.setupPhase2Word();
                }

                this.updateUI();
            }

            setupPhase1Word() {
                const needsAnimation = !this.animationShown[this.currentWordIndex];

                // Phase 1 always uses outline
                const writerOk = this.createWriter(true);
                if (!writerOk) {
                    // Character data not available – skip this word automatically
                    this.setMessage(`⚠️ Cannot load character. Skipping...`);
                    setTimeout(() => this.advanceWord(), 1500);
                    return;
                }

                if (needsAnimation) {
                    this.isAnimating = true;
                    this.checkBtn.disabled = true;
                    this.setMessage('🎬 Watching stroke order animation...');

                    try {
                        this.writer.animateCharacter({
                            onComplete: () => {
                                // Instead of calling writer.erase() (which may not be available),
                                // we destroy and recreate the writer for a clean canvas.
                                this.safeClearCanvas();
                                this.isAnimating = false;
                                this.animationShown[this.currentWordIndex] = true;
                                this.setMessage('✏️ Now draw the character 3 times.');
                                this.updateUI();
                            }
                        });
                    } catch (err) {
                        console.warn('Animation failed, skipping to writing', err);
                        this.safeClearCanvas();
                        this.isAnimating = false;
                        this.animationShown[this.currentWordIndex] = true;
                        this.setMessage('✏️ Draw the character (animation skipped).');
                        this.updateUI();
                    }
                } else {
                    this.isAnimating = false;
                    this.setMessage('✏️ Draw the character.');
                    this.updateUI();
                }
            }

            setupPhase2Word() {
                const remaining = this.getRemainingAttempts();
                // Phase 2 outline pattern: true for 1st attempt, false for 2nd & 3rd
                const showOutline = (remaining === 3);

                this.isAnimating = false;
                const writerOk = this.createWriter(showOutline);
                if (!writerOk) {
                    this.setMessage(`⚠️ Cannot load character. Skipping...`);
                    setTimeout(() => this.advanceWord(), 1500);
                    return;
                }

                const label = showOutline ? 'with outline' : 'without outline';
                this.setMessage(`✏️ Phase 2 – Draw the character (${label}).`);
                this.updateUI();
            }

            async handleCheck() {
                if (!this.writer || this.isAnimating) return;
                if (this.currentWordIndex >= this.totalWords) return;

                try {
                    const result = await this.writer.evaluateCharacter();
                    if (result.score >= 0.7) {
                        this.handleSuccessfulAttempt();
                    } else {
                        this.setMessage(
                            `❌ Score: ${Math.round(result.score * 100)}%. Keep trying! (Need ≥70%)`
                            );
                        this.flashCanvas();
                    }
                } catch (err) {
                    console.error('Evaluation error', err);
                    this.setMessage('⚠️ Evaluation error. Please try again.');
                }
            }

            flashCanvas() {
                if (this.writerTarget) {
                    this.writerTarget.style.transition = 'background-color 0.15s';
                    this.writerTarget.style.backgroundColor = 'rgba(239, 68, 68, 0.15)';
                    setTimeout(() => {
                        if (this.writerTarget) this.writerTarget.style.backgroundColor = '';
                    }, 200);
                }
            }

            handleSuccessfulAttempt() {
                if (this.currentPhase === 1) {
                    this.phase1AttemptsDone[this.currentWordIndex]++;
                    this.setMessage(
                        `✅ Great! ${this.getRemainingAttempts()} attempt(s) left.`
                        );
                    if (this.phase1AttemptsDone[this.currentWordIndex] >= 3) {
                        this.advanceWord();
                    } else {
                        // next attempt – always outline in Phase 1
                        this.createWriter(true);
                        this.updateUI();
                    }
                } else {
                    this.phase2AttemptsDone[this.currentWordIndex]++;
                    this.setMessage(
                        `✅ Great! ${this.getRemainingAttempts()} attempt(s) left.`
                        );
                    if (this.phase2AttemptsDone[this.currentWordIndex] >= 3) {
                        this.advanceWord();
                    } else {
                        const remaining = this.getRemainingAttempts();
                        const showOutline = (remaining === 3);
                        this.createWriter(showOutline);
                        const label = showOutline ? 'with outline' : 'without outline';
                        this.setMessage(`✅ Next attempt: ${label}. ${remaining} attempt(s) left.`);
                        this.updateUI();
                    }
                }
            }

            advanceWord() {
                this.currentWordIndex++;
                this.destroyWriter();
                this.currentMisses = 0;
                this.setupCurrentWord();
            }

            advanceToPhase2() {
                this.currentPhase = 2;
                this.currentWordIndex = 0;
                this.phase2AttemptsDone = new Array(this.totalWords).fill(0);
                this.currentMisses = 0;
                this.isAnimating = false;
                this.destroyWriter();

                this.setMessage('🎯 Phase 2 begins! Mixed outline practice.');
                this.setupCurrentWord();
            }

            /**
             * Reset the canvas: uses safeClearCanvas() which destroys and recreates
             * the writer, guaranteeing a fresh start without relying on erase().
             */
            handleResetCanvas() {
                if (!this.writer || this.isAnimating) return;
                this.safeClearCanvas();
                this.setMessage('🔄 Canvas reset. Keep trying!');
            }

            // ──────────────────────────────────
            // RESULTS SCREEN
            // ──────────────────────────────────
            showResults() {
                this.destroyWriter();
                this.gameScreen.classList.add('hidden');
                this.resultsScreen.classList.remove('hidden');

                this.resultCharsMastered.textContent = this.totalWords;
                this.resultTotalMistakes.textContent = this.totalMistakesAllTime;
                this.resultHintsShown.textContent = this.totalHintsShown;
                this.progressBar.style.width = '100%';
            }
        }

        // ──────────────────────────────────
        // START THE APPLICATION
        // ──────────────────────────────────
        new WritingPracticeApp(loadedFlashcards);
    }
</script>
