<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>P2P Chromebook Chat (Local Version)</title>
    <script src="https://unpkg.com/peerjs@1.3.1/dist/peerjs.min.js">
    </script>
    <style>
        :root {
            --bg: #121212;
            --surface: #1e1e1e;
            --border: #333;
            --text: #fff;
            --text-secondary: #aaa;
            --accent: #007bff;
            --accent-hover: #0056b3;
            --file-btn: #28a745;
            --file-btn-hover: #1e7e34;
            --danger: #ff4444;
            --success: #00ff00;
            --input-bg: #222;
            --chat-bg: #000;
            --radius: 8px;
            --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: var(--font);
            background: var(--bg);
            color: var(--text);
            padding: 12px;
            display: flex;
            flex-direction: column;
            height: 100vh;
            height: 100dvh;
            /* dynamic viewport height for mobile */
            gap: 10px;
            -webkit-tap-highlight-color: transparent;
            -webkit-user-select: none;
            user-select: none;
        }

        /* ---- Header / Status Area ---- */
        .header {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
        }
        .header h2 {
            font-size: 1.1rem;
            font-weight: 600;
            margin: 0;
            white-space: nowrap;
        }
        #status {
            font-weight: 700;
        }
        #status.error {
            color: var(--danger);
        }
        #status.success {
            color: var(--success);
        }
        .my-id-row {
            font-size: 0.85rem;
            color: var(--text-secondary);
            word-break: break-all;
            width: 100%;
        }
        #my-id {
            font-weight: 600;
            color: #fff;
        }

        /* ---- Connect Row ---- */
        .connect-row {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        .connect-row input {
            flex: 1 1 120px;
            min-width: 100px;
        }

        /* ---- Mode Switch ---- */
        #mode-switch-btn {
            background: #6c757d;
            font-size: 0.85rem;
            padding: 8px 12px;
            white-space: nowrap;
        }
        #mode-switch-btn:active {
            background: #545b62;
        }

        /* ---- Chat Area ---- */
        #chat {
            flex: 1 1 auto;
            border: 1px solid var(--border);
            background: var(--chat-bg);
            overflow-y: auto;
            padding: 12px;
            border-radius: var(--radius);
            font-size: 0.95rem;
            line-height: 1.5;
            word-break: break-word;
            -webkit-overflow-scrolling: touch;
            /* smooth scroll on iOS */
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        #chat>div {
            padding: 6px 10px;
            border-radius: 12px;
            max-width: 85%;
            animation: fadeIn 0.2s ease;
        }
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(6px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        #chat .msg-you {
            background: #1a3a5c;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }
        #chat .msg-friend {
            background: #2a2a2a;
            align-self: flex-start;
            border-bottom-left-radius: 4px;
        }
        #chat .msg-system {
            align-self: center;
            font-size: 0.75rem;
            color: #888;
            background: transparent;
            max-width: 100%;
            text-align: center;
        }
        #chat img {
            max-width: 180px;
            max-height: 180px;
            border-radius: 10px;
            margin-top: 4px;
            display: block;
        }
        #chat a {
            color: #6db3ff;
            text-decoration: underline;
            word-break: break-all;
        }

        /* ---- Input Row ---- */
        .input-row {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            align-items: center;
        }
        .input-row input[type="text"] {
            flex: 1 1 100px;
            min-width: 80px;
        }
        button,
        .file-button {
            padding: 10px 14px;
            cursor: pointer;
            border: none;
            border-radius: var(--radius);
            font-size: 0.9rem;
            font-weight: 600;
            color: #fff;
            background: var(--accent);
            white-space: nowrap;
            transition: background 0.15s, transform 0.1s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 44px;
            /* touch target */
            -webkit-tap-highlight-color: transparent;
        }
        button:active,
        .file-button:active {
            transform: scale(0.96);
            background: var(--accent-hover);
        }
        .file-button {
            background: var(--file-btn);
        }
        .file-button:active {
            background: var(--file-btn-hover);
        }
        #send-btn {
            background: var(--accent);
        }
        #send-btn:active {
            background: var(--accent-hover);
        }

        /* ---- Inputs ---- */
        input[type="text"] {
            padding: 10px 12px;
            border-radius: var(--radius);
            border: 1px solid var(--border);
            background: var(--input-bg);
            color: var(--text);
            font-size: 0.95rem;
            min-height: 44px;
            /* touch target */
        }
        input[type="text"]:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 2px rgba(0, 123, 255, 0.25);
        }
        #file-input {
            display: none;
        }

        /* ---- Debug Log (desktop only) ---- */
        #debug-log {
            font-size: 10px;
            color: #555;
            height: 55px;
            overflow-y: auto;
            border-top: 1px solid var(--border);
            padding-top: 6px;
            margin-top: 2px;
            display: block;
            /* shown by default, hidden on mobile via media query */
            line-height: 1.4;
        }
        #debug-log .error {
            color: var(--danger);
        }
        #debug-log .success {
            color: var(--success);
        }

        /* ---- File Display (for previews, optional) ---- */
        #file-display {
            display: none;
        }

        /* ============ MOBILE RESPONSIVENESS ============ */
        @media (max-width: 600px) {
            body {
                padding: 8px;
                gap: 8px;
            }
            .header h2 {
                font-size: 1rem;
            }
            .my-id-row {
                font-size: 0.75rem;
            }
            #mode-switch-btn {
                font-size: 0.75rem;
                padding: 8px 10px;
            }
            #chat {
                padding: 8px;
                font-size: 0.9rem;
                border-radius: 6px;
            }
            #chat img {
                max-width: 140px;
                max-height: 140px;
            }
            button,
            .file-button {
                font-size: 0.8rem;
                padding: 10px 12px;
                min-height: 40px;
            }
            input[type="text"] {
                font-size: 0.9rem;
                padding: 10px;
                min-height: 40px;
            }

            /* 🔴 HIDE DEBUG LOG ON MOBILE */
            #debug-log {
                display: none !important;
            }
        }

        /* Extra small phones (like iPhone SE) */
        @media (max-width: 380px) {
            .header h2 {
                font-size: 0.9rem;
            }
            #mode-switch-btn {
                font-size: 0.7rem;
                padding: 6px 8px;
            }
            button,
            .file-button {
                font-size: 0.75rem;
                padding: 8px 10px;
                min-height: 36px;
            }
            input[type="text"] {
                font-size: 0.8rem;
                padding: 8px;
                min-height: 36px;
            }
            #chat {
                font-size: 0.85rem;
            }
        }
    </style>
</head>
<body>

    <div class="header">
        <h2>Chat: <span id="status" class="error">Offline</span></h2>
        <button id="mode-switch-btn">Switch to Secure Mode (Long ID)</button>
    </div>
    <div class="my-id-row">Your ID: <strong id="my-id">---</strong></div>

    <div class="connect-row">
        <input type="text" id="receiver-id" placeholder="Friend's ID" inputmode="text" autocapitalize="off" autocomplete="off">
        <button id="connect-btn">Connect</button>
    </div>

    <div id="chat"></div>

    <div class="input-row">
        <input type="text" id="message-input" placeholder="Type a message..." inputmode="text" autocomplete="off">
        <button id="send-btn">Send</button>
        <label for="file-input" class="file-button">📎 File</label>
        <input type="file" id="file-input" accept="*/*">
    </div>

    <div id="debug-log">🔍 Debug info will appear here...</div>
    <div id="file-display" class="file-display"></div>

    <script>
        (function() {
            // ─────────────────────────────────────
            // Logging helper
            // ─────────────────────────────────────
            function log(msg, isError = false) {
                const d = document.getElementById('debug-log');
                if (!d) return;
                const className = isError ? 'error' : '';
                d.innerHTML +=
                    `<div class="${className}">[${new Date().toLocaleTimeString()}] ${msg}</div>`;
                d.scrollTop = d.scrollHeight;
            }

            // ─────────────────────────────────────
            // Random ID generator for fast mode
            // ─────────────────────────────────────
            function generateId(length) {
                const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789';
                let result = '';
                for (let i = 0; i < length; i++) {
                    result += chars.charAt(Math.floor(Math.random() * chars.length));
                }
                return result;
            }

            // ─────────────────────────────────────
            // State
            // ─────────────────────────────────────
            let fastMode = true; // ✅ DEFAULT: FAST MODE
            let myPeerId = null;
            let peer = null;
            let conn = null;

            // ─────────────────────────────────────
            // DOM elements
            // ─────────────────────────────────────
            const statusEl = document.getElementById('status');
            const myIdEl = document.getElementById('my-id');
            const chatEl = document.getElementById('chat');
            const msgInput = document.getElementById('message-input');
            const receiverInput = document.getElementById('receiver-id');
            const modeSwitchBtn = document.getElementById('mode-switch-btn');
            const connectBtn = document.getElementById('connect-btn');
            const sendBtn = document.getElementById('send-btn');
            const fileInput = document.getElementById('file-input');
            const debugLogEl = document.getElementById('debug-log');

            // ─────────────────────────────────────
            // Initialize Peer
            // ─────────────────────────────────────
            function initializePeer() {
                if (peer) {
                    peer.destroy();
                    peer = null;
                }
                conn = null;

                if (fastMode) {
                    myPeerId = generateId(5);
                    log("⚡ Fast Mode: Generated ID → " + myPeerId);
                    peer = new Peer(myPeerId);
                } else {
                    myPeerId = null;
                    log("🔒 Secure Mode: Using PeerJS server-generated ID");
                    peer = new Peer();
                }
                setupPeerEvents();
            }

            function setupPeerEvents() {
                peer.on('open', (id) => {
                    myIdEl.innerText = id;
                    statusEl.innerText = 'Online ✓';
                    statusEl.className = 'success';
                    log("✅ Connected to signaling server. ID: " + id);
                });

                peer.on('error', (err) => {
                    log("❌ Peer Error: " + err.type, true);
                    if (err.type === 'peer-unavailable') {
                        log("👉 Friend's ID not found or not online.", true);
                    }
                    if (err.type === 'unavailable-id' && fastMode) {
                        log("🔄 ID collision! Retrying with a new ID...", true);
                        initializePeer();
                    }
                });

                peer.on('connection', (incomingConn) => {
                    conn = incomingConn;
                    log("📥 Incoming connection from: " + conn.peer);
                    setupConnectionHandlers();
                });

                peer.on('disconnected', () => {
                    log("⚠️ Disconnected from signaling server. Attempting reconnect...");
                    statusEl.innerText = 'Reconnecting...';
                    statusEl.className = 'error';
                    if (peer && !peer.destroyed) {
                        peer.reconnect();
                    }
                });
            }

            // ─────────────────────────────────────
            // Connection handlers
            // ─────────────────────────────────────
            function setupConnectionHandlers() {
                if (!conn) return;

                conn.on('open', () => {
                    log("🤝 Handshake complete. Chat is live!");
                    appendSystemMsg("🔗 Connected!");
                });

                conn.on('data', (data) => {
                    if (typeof data === 'string') {
                        appendMsg('friend', data);
                    } else if (data && data.fileType === 'image') {
                        appendImageMsg('friend', data.fileData);
                    } else if (data && data.fileType === 'document') {
                        appendDocumentMsg('friend', data.fileName, data.fileData);
                    }
                });

                conn.on('close', () => {
                    log("🔌 Connection closed.");
                    appendSystemMsg("⚡ Peer disconnected.");
                    conn = null;
                });

                conn.on('error', (err) => {
                    log("⚠️ Connection error: " + err, true);
                });
            }

            // ─────────────────────────────────────
            // Outbound connection
            // ─────────────────────────────────────
            function connectToPeer(remoteId) {
                if (!remoteId || !peer) return;
                log("📞 Connecting to: " + remoteId);
                conn = peer.connect(remoteId, {
                    reliable: true
                });
                setupConnectionHandlers();
            }

            // ─────────────────────────────────────
            // Sending messages
            // ─────────────────────────────────────
            function sendTextMessage() {
                const text = msgInput.value.trim();
                if (!text) return;
                if (!conn || !conn.open) {
                    log("❌ Cannot send: No open connection.", true);
                    appendSystemMsg("⚠️ Not connected to anyone.");
                    return;
                }
                conn.send(text);
                appendMsg('you', text);
                msgInput.value = '';
            }

            function sendFile(file) {
                if (!file) return;
                if (!conn || !conn.open) {
                    log("❌ Cannot send file: No open connection.", true);
                    appendSystemMsg("⚠️ Not connected to anyone.");
                    return;
                }
                const reader = new FileReader();
                reader.onload = (e) => {
                    const fileData = e.target.result;
                    const fileName = file.name;
                    const fileType = file.type.startsWith('image') ? 'image' : 'document';
                    conn.send({ fileType, fileName, fileData });
                    if (fileType === 'image') {
                        appendImageMsg('you', fileData);
                    } else {
                        appendDocumentMsg('you', fileName, fileData);
                    }
                    log(`📎 Sent file: ${fileName} (${fileType})`);
                };
                reader.readAsDataURL(file);
            }

            // ─────────────────────────────────────
            // Chat display helpers
            // ─────────────────────────────────────
            function appendMsg(sender, text) {
                const div = document.createElement('div');
                div.className = sender === 'you' ? 'msg-you' : 'msg-friend';
                div.innerHTML = `<strong>${sender === 'you' ? 'You' : 'Friend'}:</strong> ${escapeHTML(text)}`;
                chatEl.appendChild(div);
                scrollChatToBottom();
            }

            function appendSystemMsg(text) {
                const div = document.createElement('div');
                div.className = 'msg-system';
                div.textContent = text;
                chatEl.appendChild(div);
                scrollChatToBottom();
            }

            function appendImageMsg(sender, imageData) {
                const div = document.createElement('div');
                div.className = sender === 'you' ? 'msg-you' : 'msg-friend';
                div.innerHTML =
                    `<strong>${sender === 'you' ? 'You' : 'Friend'}:</strong><br><img src="${imageData}" alt="Shared image" loading="lazy">`;
                chatEl.appendChild(div);
                scrollChatToBottom();
            }

            function appendDocumentMsg(sender, fileName, fileData) {
                const div = document.createElement('div');
                div.className = sender === 'you' ? 'msg-you' : 'msg-friend';
                const link = document.createElement('a');
                link.href = fileData;
                link.download = fileName;
                link.textContent = '📄 ' + fileName;
                link.target = '_blank';
                div.innerHTML = `<strong>${sender === 'you' ? 'You' : 'Friend'}:</strong><br>`;
                div.appendChild(link);
                chatEl.appendChild(div);
                scrollChatToBottom();
            }

            function scrollChatToBottom() {
                requestAnimationFrame(() => {
                    chatEl.scrollTop = chatEl.scrollHeight;
                });
            }

            function escapeHTML(str) {
                const temp = document.createElement('div');
                temp.textContent = str;
                return temp.innerHTML;
            }

            // ─────────────────────────────────────
            // Mode switch
            // ─────────────────────────────────────
            function updateModeButton() {
                if (fastMode) {
                    modeSwitchBtn.textContent = 'Switch to Secure Mode (Long ID)';
                } else {
                    modeSwitchBtn.textContent = 'Switch to Fast Mode (Less Secure)';
                }
            }

            modeSwitchBtn.addEventListener('click', () => {
                fastMode = !fastMode;
                updateModeButton();
                log(fastMode ? '⚡ Switched to FAST mode.' : '🔒 Switched to SECURE mode.');
                initializePeer();
            });

            // ─────────────────────────────────────
            // Event listeners
            // ─────────────────────────────────────
            connectBtn.addEventListener('click', () => {
                const rid = receiverInput.value.trim();
                if (rid) connectToPeer(rid);
            });

            receiverInput.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    const rid = receiverInput.value.trim();
                    if (rid) connectToPeer(rid);
                }
            });

            sendBtn.addEventListener('click', sendTextMessage);
            msgInput.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    sendTextMessage();
                }
            });

            fileInput.addEventListener('change', (e) => {
                const file = e.target.files[0];
                if (file) {
                    sendFile(file);
                    fileInput.value = ''; // allow re-uploading same file
                }
            });

            // ─────────────────────────────────────
            // Startup
            // ─────────────────────────────────────
            window.addEventListener('load', () => {
                log('🚀 App loaded.');
                if (typeof Peer === 'undefined') {
                    log('💥 CRITICAL: PeerJS library failed to load (blocked?).', true);
                    statusEl.innerText = 'LIBRARY BLOCKED';
                    statusEl.className = 'error';
                    return;
                }
                updateModeButton();
                initializePeer();
            });

            // Expose for debugging (optional)
            window.chatApp = {
                get fastMode() { return fastMode; },
                get peer() { return peer; },
                get conn() { return conn; },
                log,
                initializePeer,
                connectToPeer,
                sendTextMessage,
            };
        })();
    </script>
</body>
</html>
